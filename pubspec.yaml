name: ban_do
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+2

environment:
  sdk: ">=3.11.3 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  firebase_auth: ^5.6.0
  firebase_core: ^3.13.0
  geolocator: ^10.0.0
  http: ^1.2.1
  shared_preferences: ^2.2.3
  cupertino_icons: ^1.0.8
  flutter_tts: ^4.0.2   # ✅ chuyển lên đây

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  adaptive_icon_background: "#ffffff"

flutter:
  uses-material-design: true

  assets:
    - assets/icon.png